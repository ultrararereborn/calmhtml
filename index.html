<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minimal Looping Text Carousel</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

.container {
  text-align: center;
}

.slide {
  display: none;
}

.slide.active {
  display: block;
}

textarea {
  width: 300px;
  height: 100px;
  padding: 10px;
  font-size: 16px;
  border: 1px solid #aaa;
  border-radius: 6px;
  resize: none;
  outline: none;
  background: white;
}

button {
  margin-top: 10px;
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  color: #555;
}

button:hover {
  color: #000;
}
</style>
</head>

<body>

<div class="container">

  <div class="slide active">
    <textarea placeholder="First thought..."></textarea>
  </div>

  <div class="slide">
    <textarea placeholder="Next thought..."></textarea>
  </div>

  <div class="slide">
    <textarea placeholder="Final reflection..."></textarea>
  </div>

  <button id="nextBtn">→</button>

</div>

<script>
let currentSlide = 0;
const slides = document.querySelectorAll(".slide");
const nextBtn = document.getElementById("nextBtn");

nextBtn.addEventListener("click", () => {
  slides[currentSlide].classList.remove("active");
  currentSlide = (currentSlide + 1) % slides.length; // loop
  slides[currentSlide].classList.add("active");
});
</script>

</body>
</html>
