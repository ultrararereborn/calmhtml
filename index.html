<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Looping Text Carousel</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: #f5f5f5;
  font-family: sans-serif;
}

.container {
  width: 400px;
  text-align: center;
}

.slide {
  display: none;
}

.slide.active {
  display: block;
}

textarea {
  width: 100%;
  height: 120px;
  padding: 12px;
  font-size: 16px;
  border: 1px solid #ddd;
  border-radius: 10px;
  resize: none;
  outline: none;
  background: white;
}

button {
  margin-top: 20px;
  background: none;
  border: none;
  font-size: 26px;
  cursor: pointer;
  color: #555;
}

button:hover {
  color: #000;
}
</style>
</head>

<body>

<div class="container">

  <div class="slide active">
    <textarea placeholder="Write your first thought..."></textarea>
  </div>

  <div class="slide">
    <textarea placeholder="What comes next?"></textarea>
  </div>

  <div class="slide">
    <textarea placeholder="Final reflection..."></textarea>
  </div>

  <button id="nextBtn">→</button>

</div>

<script>
let currentSlide = 0;
const slides = document.querySelectorAll(".slide");
const nextBtn = document.getElementById("nextBtn");

nextBtn.addEventListener("click", () => {
  slides[currentSlide].classList.remove("active");

  // 🔁 This makes it loop
  currentSlide = (currentSlide + 1) % slides.length;

  slides[currentSlide].classList.add("active");
});
</script>

</body>
</html>
